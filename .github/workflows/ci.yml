name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Unit, Integration, and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Bun
        run: |
          BUN_VERSION="$(tr -d '\n' < .bun-version)"
          BUN_VERSION="${BUN_VERSION#bun-v}"
          BUN_VERSION="${BUN_VERSION#v}"
          if ! command -v unzip >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ env.CODECOV_TOKEN != '' }}
        run: |
          python3 -m pip install --user codecov-cli
          export PATH="$HOME/.local/bin:$PATH"

          args=(
            do-upload
            --git-service github
            --token "$CODECOV_TOKEN"
            --slug "$GITHUB_REPOSITORY"
            --commit-sha "$GITHUB_SHA"
            --file coverage/lcov.info
            --disable-search
          )

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            args+=( --pull-request-number "${{ github.event.pull_request.number }}" )
          fi

          codecovcli "${args[@]}" || echo "Codecov upload failed; continuing because fail_ci_if_error is disabled."

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Bun
        run: |
          BUN_VERSION="$(tr -d '\n' < .bun-version)"
          BUN_VERSION="${BUN_VERSION#bun-v}"
          BUN_VERSION="${BUN_VERSION#v}"
          if ! command -v unzip >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi
          curl -fsSL https://bun.sh/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency audit
        run: bun run audit
